<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beats Sign Up</title>
    <link rel="stylesheet" href="signup.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

<script>
function val(){
    
    var name = document.fm.nme.value;
    var dob = document.fm.dobb.value;
    var gender = document.fm.gdr.value;
    var mobile = document.fm.mb.value;
    var region = document.fm.rgn.value;
    var email = document.fm.el.value;
    var password = document.fm.pass.value;

    if(name == ""){
        alert("Full Name is required");
        return false;
    }

    if(dob == ""){
        alert("Date of Birth is required");
        return false;
    }

    if(gender == ""){
        alert("Please select Gender");
        return false;
    }

    if(mobile == ""){
        alert("Mobile number is required");
        return false;
    }

    if(mobile.length != 10){
        alert("Mobile number must be 10 digits");
        return false;
    }

    if(isNaN(mobile)){
        alert("Mobile number must be numeric");
        return false;
    }

    if(region == ""){
        alert("Please select Region");
        return false;
    }

    if(email == ""){
        alert("Email is required");
        return false;
    }

    var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(!email.match(emailPattern)){
        alert("Enter valid email address");
        return false;
    }

    if(password == ""){
        alert("Password is required");
        return false;
    }

    if(password.length < 6){
        alert("Password must be at least 6 characters");
        return false;
    }

    alert("Signup Successful!");
    return true;
}
</script>

  </head>
  <body>
    <video autoplay muted loop id="bg-video">
        <source src="redbg.mp4" type="video/mp4">
    </video>
    <div class="signup-container">
      <div class="logo">
        <h1>Beats</h1>
      </div>
      <h2>Create your account</h2>
      <form name="fm" class="f1" onsubmit = "return val()" method="POST" action="data.php">
        <label>Full Name</label>
        <input type="text" name="nme" placeholder="Enter your name" />
        <label>Date of Birth</label>
        <input type="date" name="dobb" />
        <label>Gender</label>
        <select name="gdr">
          <option value="" disabled selected>Select Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
        <label>Mobile Number</label>
        <input type="tel" name="mb" placeholder="Enter mobile number" />
        <label>Region</label>
        <select name="rgn">
          <option value="" disabled selected>Select Region</option>
          <option value="asia">Asia</option>
          <option value="africa">Africa</option>
          <option value="north_america">North America</option>
          <option value="south_america">South America</option>
          <option value="europe">Europe</option>
          <option value="australia">Australia</option>
          <option value="antarctica">Antarctica</option>
        </select>
        <label>Email</label>
        <input type="email" name="el" placeholder="Enter your email" />
        <label>Password</label>
        <input type="password" name="pass" placeholder="Create password" />
        <button type="submit" class="signup-btn">Sign Up</button>
      </form>
      <p class="login-link">
        Already have an account? <a href="beatslogin.html">Log in</a>
      </p>
    </div>
  </body>
</html>
